<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>NEXUS INTEL — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
<link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body>
<div class="bg-scene"></div>
<div class="bg-grid"></div>
<div class="bg-scan"></div>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="auth-logo">🛡️</div>
      <div class="auth-title">NEXUS INTEL</div>
      <div style="color:var(--muted2);font-size:.78rem;letter-spacing:2px;text-transform:uppercase;margin-top:4px">Criminal Face Detection System</div>
    </div>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat,msg in msgs %}
        <div class="alert alert-{{ 'danger' if cat=='error' else cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post">
      <div class="mb-3">
        <label>Username</label>
        <input class="form-control mt-1" name="username" placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="mb-4">
        <label>Password</label>
        <input class="form-control mt-1" type="password" name="password" placeholder="Enter password" autocomplete="current-password" required>
      </div>
      <button class="btn btn-cyber w-100" style="padding:12px">AUTHENTICATE</button>
    </form>
    <div class="text-center mt-3" style="font-size:.75rem;color:var(--muted)">Default: admin / admin123</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
